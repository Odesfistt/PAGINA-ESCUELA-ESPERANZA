backend:
  name: github
  repo: Jocsan091/PAGINA-ESCUELA-ESPERANZA
  branch: main
  base_url: https://pagina-escuela-esperanza.pages.dev
  auth_endpoint: /api/auth

local_backend: true

media_folder: "public/images/noticias"
public_folder: "/images/noticias"

collections:
  - name: "noticias"
    label: "Noticias"
    folder: "src/content/noticias"
    create: true
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - label: "Titulo"
        name: "title"
        widget: "string"
        required: true

      - label: "Fecha"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "DD/MM/YYYY"
        time_format: false
        required: true

      - label: "Imagen principal"
        name: "image"
        widget: "image"
        required: true

      - label: "Galeria de imagenes"
        name: "gallery"
        widget: "list"
        required: false
        summary: "{{fields.foto_url}}"
        fields:
          - label: "Foto"
            name: "foto_url"
            widget: "image"
            required: true

      - label: "Video de YouTube"
        name: "video_url"
        widget: "string"
        required: false

      - label: "Borrador"
        name: "draft"
        widget: "boolean"
        default: false
        required: false

      - label: "Texto completo"
        name: "body"
        widget: "markdown"
        required: true

  - name: "documentacion_oficial"
    label: "Documentacion Oficial"
    files:
      - label: "Documentacion Oficial"
        name: "documentos_oficiales"
        file: "src/data/documentosOficiales.json"
        fields:
          - label: "Documentos"
            name: "documentos"
            widget: "list"
            allow_add: true
            collapsed: false
            required: false
            default: []
            summary: "{{fields.titulo}}"
            fields:
              - label: "Titulo"
                name: "titulo"
                widget: "string"
                required: true

              - label: "Archivo PDF"
                name: "href"
                widget: "file"
                required: true
                choose_url: false
                allow_multiple: false
                media_folder: "/public/documentos"
                public_folder: "/documentos"

  - name: "perfiles"
    label: "Perfiles"
    files:
      - label: "Directiva"
        name: "equipo_directivo"
        file: "src/data/perfiles/equipoDirectivo.json"
        fields:
          - label: "Perfiles"
            name: "integrantes"
            widget: "list"
            allow_add: false
            collapsed: false
            summary: "{{fields.cargo}} - {{fields.nombre}}"
            fields:
              - label: "Nombre"
                name: "nombre"
                widget: "string"
                required: true

              - label: "Cargo"
                name: "cargo"
                widget: "string"
                required: true

              - label: "Foto"
                name: "imagen"
                widget: "image"
                required: true
                media_folder: "/public/images/perfiles"
                public_folder: "/images/perfiles"

              - label: "Descripcion"
                name: "descripcion"
                widget: "hidden"
                required: false

      - label: "Centro de padres"
        name: "centro_padres"
        file: "src/data/perfiles/centroPadres.json"
        fields:
          - label: "Perfiles"
            name: "integrantes"
            widget: "list"
            allow_add: false
            collapsed: false
            summary: "{{fields.cargo}} - {{fields.nombre}}"
            fields:
              - label: "Nombre"
                name: "nombre"
                widget: "string"
                required: true

              - label: "Cargo"
                name: "cargo"
                widget: "string"
                required: true

              - label: "Foto"
                name: "imagen"
                widget: "image"
                required: true
                media_folder: "/public/images/perfiles"
                public_folder: "/images/perfiles"

              - label: "Descripcion"
                name: "descripcion"
                widget: "hidden"
                required: false

      - label: "Centro de alumnos"
        name: "centro_alumnos"
        file: "src/data/perfiles/centroAlumnos.json"
        fields:
          - label: "Perfiles"
            name: "integrantes"
            widget: "list"
            allow_add: false
            collapsed: false
            summary: "{{fields.cargo}} - {{fields.nombre}}"
            fields:
              - label: "Nombre"
                name: "nombre"
                widget: "string"
                required: true

              - label: "Cargo"
                name: "cargo"
                widget: "string"
                required: true

              - label: "Foto"
                name: "imagen"
                widget: "image"
                required: true
                media_folder: "/public/images/perfiles"
                public_folder: "/images/perfiles"

              - label: "Descripcion"
                name: "descripcion"
                widget: "hidden"
                required: false
