backend:
  name: github
  repo: TU_USUARIO/TU_REPOSITORIO
  branch: main

local_backend: true

media_folder: "public/images/noticias"
public_folder: "/images/noticias"

collections:
  - name: "noticias"
    label: "Noticias"
    folder: "src/content/noticias"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - label: "Titulo"
        name: "title"
        widget: "string"
      - label: "Fecha"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
      - label: "Imagen"
        name: "image"
        widget: "image"
        required: false
        default: "/images/slide3.png"
      - label: "Contenido"
        name: "body"
        widget: "markdown"
