backend:
  name: github
  repo: Jocsan091/PAGINA-ESCUELA-ESPERANZA
  branch: main
  base_url: https://pagina-escuela-esperanza.pages.dev
  auth_endpoint: /api/auth

local_backend: true

media_folder: "public/images/noticias"
public_folder: "/images/noticias"

collections:
  - name: "noticias"
    label: "Noticias"
    folder: "src/content/noticias"
    create: true
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - label: "Titulo"
        name: "title"
        widget: "string"
        required: true

      - label: "Fecha"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "DD/MM/YYYY"
        time_format: false
        required: true

      - label: "Imagen principal"
        name: "image"
        widget: "image"
        required: true

      - label: "Galeria de imagenes"
        name: "gallery"
        widget: "list"
        required: false
        summary: "{{fields.foto_url}}"
        fields:
          - label: "Foto"
            name: "foto_url"
            widget: "image"
            required: true

      - label: "Video de YouTube"
        name: "video_url"
        widget: "string"
        required: false

      - label: "Borrador"
        name: "draft"
        widget: "boolean"
        default: false
        required: false

      - label: "Texto completo"
        name: "body"
        widget: "markdown"
        required: true

  - name: "documentacion_oficial"
    label: "Documentacion Oficial"
    files:
      - label: "Documentacion Oficial"
        name: "documentos_oficiales"
        file: "src/data/documentosOficiales.json"
        fields:
          - label: "Documentos"
            name: "documentos"
            widget: "list"
            allow_add: true
            collapsed: false
            required: false
            default: []
            summary: "{{fields.titulo}}"
            fields:
              - label: "Titulo"
                name: "titulo"
                widget: "string"
                required: true

              - label: "Identificador"
                name: "id"
                widget: "string"
                required: true
                hint: "Usa texto simple sin espacios, por ejemplo reglamento-interno."

              - label: "Archivo PDF"
                name: "href"
                widget: "file"
                required: true
                media_folder: "public/documentos"
                public_folder: "/documentos"

  - name: "perfiles"
    label: "Perfiles"
    label_singular: "Perfil"
    folder: "src/content/perfiles"
    create: false
    delete: false
    nested:
      depth: 2
      summary: "{{title}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{cargo}} - {{nombre}}"
    sortable_fields: ["orden", "cargo", "nombre"]
    view_groups:
      - label: "Perfiles - Equipo directivo"
        field: "grupo"
        pattern: "equipo-directivo"
      - label: "Perfiles - Centro general de padres"
        field: "grupo"
        pattern: "centro-padres"
      - label: "Perfiles - Centro general de alumnos"
        field: "grupo"
        pattern: "centro-alumnos"
    fields:
      - label: "Categoria"
        name: "categoria"
        widget: "hidden"

      - label: "Grupo"
        name: "grupo"
        widget: "hidden"

      - label: "Orden"
        name: "orden"
        widget: "hidden"

      - label: "Titulo interno"
        name: "title"
        widget: "hidden"

      - label: "Nombre"
        name: "nombre"
        widget: "string"
        required: true

      - label: "Cargo"
        name: "cargo"
        widget: "string"
        required: true

      - label: "Foto"
        name: "imagen"
        widget: "image"
        required: true
        media_folder: "public/images/perfiles"
        public_folder: "/images/perfiles"

      - label: "Descripcion"
        name: "descripcion"
        widget: "hidden"
